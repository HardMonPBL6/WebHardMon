<!DOCTYPE html>
<html lang="eu" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHardMon - Telemetria</title>
    <!-- Tailwind CSS (local copy — avoids CDN integrity risk) -->
    <script src="/js/tailwind.cdn.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkPanel: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
      .grafana-panel-frame { overflow: hidden; }
      .grafana-panel-frame iframe { display: block; overflow: hidden; }
    </style>
    <!-- Matomo -->
    <th:block th:if="${matomoUrl}">
    <script th:inline="javascript">
        var _paq = window._paq = window._paq || [];
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function() {
            var u=/*[[${matomoUrl}]]*/ "//localhost:8081/";
            _paq.push(['setTrackerUrl', u+'matomo.php']);
            _paq.push(['setSiteId', '1']);
            var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
            g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
        })();
    </script>
    </th:block>
    <!-- End Matomo -->
</head>
<body class="bg-darkBg text-gray-200 antialiased h-screen flex overflow-hidden selection:bg-blue-600 selection:text-white">

    <!-- Sidebar -->

        </div>

                Enpresa
            </a>

            <a th:href="@{/dashboard/ordenadores}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'ordenadores'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Ordenagailuak

            <a th:href="@{/licencias}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'licencias'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                Lizentziak

            <a th:if="${isSuperAdmin}" th:href="@{/admin/usuarios}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'adminUsuarios'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Administratzaileak
            </a>
            <button onclick="openEtikaModal()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-colors hover:bg-gray-800 text-gray-400 hover:text-white text-left">

                Etika

        </nav>
    </aside>

    <!-- Main Content -->

        <!-- Header -->

            <div class="text-sm font-medium text-gray-400">

            <!-- Selectores de Dispositivo y Rango de Tiempo -->

                </div>
                <div class="h-4 w-px bg-gray-800" th:if="${dashboardTipo == 'ordenadores'}"></div>

    <div th:replace="~{fragments :: etika-modal}"></div>

    <!-- Panelaren kontrol dinamikoa (d-solo) -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const empresaId = [[${empresaId}]];
        const dashboardTipo = [[${dashboardTipo}]];
        const portatilesCassandra = [[${portatiles}]];
        
        // Fallback local para desarrollo: coincide con seed-cassandra.cql si Cassandra no responde.
        const RAM_TOTAL_OPCIONES = [8, 16, 32, 64];
        const STORAGE_TOTAL_OPCIONES = [256, 512, 1024, 2048];
        const PROCESADORES = ["Intel_i5_1135G7", "Intel_i7_1165G7", "AMD_Ryzen_5_5600U", "AMD_Ryzen_7_5800U", "Apple_M1"];
        
        const laptops = [];
        
        if (Array.isArray(portatilesCassandra) && portatilesCassandra.length > 0) {
            portatilesCassandra.forEach(name => laptops.push({
                name: name,
                ram: '',
                storage: '',
                processor: 'detectado'
            }));
        } else {
            for (let i = 1; i <= 100; i++) {
                const calculatedEmpresaId = (i % 3) + 1;
                if (calculatedEmpresaId === parseInt(empresaId)) {
                    const pcName = `PC-${empresaId}-${i}`;
                    const ram = RAM_TOTAL_OPCIONES[i % RAM_TOTAL_OPCIONES.length];
                    const storage = STORAGE_TOTAL_OPCIONES[i % STORAGE_TOTAL_OPCIONES.length];
                    const processor = PROCESADORES[i % PROCESADORES.length];
                    
                    laptops.push({
                        name: pcName,
                        ram: ram.toString(),
                        storage: storage.toString(),
                        processor: processor
                    });
                }
            }
        }

        // Sortu dinamikoki ordenagailuen zerrenda uneko iragazkien arabera
        function populateLaptops() {
            const selectPortatil = document.getElementById('selectPortatil');
            if (!selectPortatil) { return; }
            const selectedRam = (document.getElementById('selectRam')?.value || 'All');
            const selectedStorage = (document.getElementById('selectStorage')?.value || 'All');
            const previousValue = selectPortatil.value;
            
            // Vaciar excepto el primero (Guztiak)
            selectPortatil.innerHTML = '';
            
            laptops.forEach(laptop => {
                const matchesRam = selectedRam === 'All' || laptop.ram === selectedRam;
                const matchesStorage = selectedStorage === 'All' || laptop.storage === selectedStorage;
                
                if (matchesRam && matchesStorage) {
                    const option = document.createElement('option');
                    option.value = laptop.name;
                    if (laptop.ram && laptop.storage) {
                        option.textContent = `${laptop.name} (${laptop.processor}, ${laptop.ram}GB, ${laptop.storage >= 1024 ? (laptop.storage / 1024) + 'TB' : laptop.storage + 'GB'})`;
                    } else {
                        option.textContent = laptop.name;
                    }
                    selectPortatil.appendChild(option);
                }
            });
            
            // Mantendu aurretik hautatutako balioa, iragazitako zerrendan oraindik badago
            if ([...selectPortatil.options].some(opt => opt.value === previousValue)) {
                selectPortatil.value = previousValue;
            } else {
                if (selectPortatil.options.length > 0) { selectPortatil.value = selectPortatil.options[0].value; }
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const selectTime = document.getElementById('selectTime');
            if (selectTime && dashboardTipo === 'ordenadores') {
                selectTime.value = 'now-24h';
            }
            if (selectTime && dashboardTipo === 'empresa') {
                selectTime.value = 'now-30d';
            }
            if (dashboardTipo === 'ordenadores') {
                populateLaptops();
            }
            if (dashboardTipo === 'empresa') {
                loadHistorico(7);
            }
            updatePanela();
        });


        function updateTopPanelHeights() {
            if (dashboardTipo !== 'empresa') { return; }
            const topKValue = document.getElementById('selectTopK')?.value || '10';
            const heightByTop = { '5': '360px', '10': '520px', '15': '720px' };
            const height = heightByTop[topKValue] || '420px';
            document.querySelectorAll('.top-panel').forEach(panel => {
                panel.style.height = height;
            });
        }

        // Valores concretos de cada filtro (mismos que los <option> del desplegable).
        // "Guztiak" se expande a esta lista: NUNCA mandamos var-ram=$__all en la URL,
        // porque $__all + :singlequote en el IN(...) del dashboard no se resuelve en la
        // carga inicial y la query sale vacia. Mandar los valores reales evita el bug.
        const RAM_VAR_VALUES     = ['8 GB', '16 GB', '32 GB', '64 GB'];
        const STORAGE_VAR_VALUES = ['238 GB', '476 GB', '953 GB', '1907 GB'];

        // Fija una variable multi-valor de Grafana en la URL. Si el valor es "$__all"
        // (Guztiak), la expande a la lista concreta repitiendo el parametro
        // (var-ram=8 GB&var-ram=16 GB&...), que es como Grafana recibe un multi-select.
        function setGrafanaMultiVar(url, key, value, allValues) {
            url.searchParams.delete(key);
            if (value === '$__all') {
                allValues.forEach(v => url.searchParams.append(key, v));
            } else {
                url.searchParams.append(key, value);
            }
        }

        // Berriro kargatu iframe guztiak hautatutako iragazki berriekin
        function updatePanela() {
            const timeValue = document.getElementById('selectTime')?.value || (dashboardTipo === 'empresa' ? 'now-30d' : 'now-24h');
            const portatilValue = document.getElementById('selectPortatil')?.value || (laptops[0]?.name || '');
            const ramValue = document.getElementById('selectRam')?.value || '$__all';
            const storageValue = document.getElementById('selectStorage')?.value || '$__all';
            const topKValue = document.getElementById('selectTopK')?.value || '10';
            const ordenValue = document.getElementById('selectOrden')?.value || 'beheranzko';
            updateTopPanelHeights();
            const iframes = document.querySelectorAll('main iframe');

            iframes.forEach(iframe => {
                let url = new URL(iframe.src);
                url.searchParams.set('from', timeValue);
                url.searchParams.set('to', 'now');

                if (dashboardTipo === 'ordenadores') {
                    url.searchParams.set('var-nombre', portatilValue === 'All' ? laptops[0]?.name || '' : portatilValue);
                }

                if (dashboardTipo === 'empresa') {
                    setGrafanaMultiVar(url, 'var-ram', ramValue, RAM_VAR_VALUES);
                    setGrafanaMultiVar(url, 'var-storage', storageValue, STORAGE_VAR_VALUES);
                    url.searchParams.set('var-topk', topKValue);
                    if (iframe.closest('.top-panel')) {
                        const pid = parseInt(url.searchParams.get('panelId'), 10);
                        const base = (pid >= 13 && pid <= 17) ? pid - 6 : pid;
                        url.searchParams.set('panelId', ordenValue === 'goranzko' ? base + 6 : base);
                    }
                }

                iframe.src = url.toString();
            });
        }
        // ── Tendencias historikoak (HBase) ───────────────────────────────────

        async function loadHistorico(days) {
            const loading   = document.getElementById('historico-loading');
            const container = document.getElementById('historico-table-container');
            if (!loading || !container) return;

            loading.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const resp = await fetch('/api/historico?days=' + days);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                renderHistorico(data, parseInt(days));
            } catch (e) {
                container.innerHTML = '<p class="text-gray-500 text-sm py-4 text-center">Ezin izan da historia kargatu. Egiaztatu HBase konexioa.</p>';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderHistorico(data, days) {
            const container = document.getElementById('historico-table-container');
            if (!container) return;
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm py-4 text-center">Ez dago datu historikorik aukeratutako tartean.</p>';
                return;
            }

            const isHourly  = days === 1;
            const displayRows = isHourly ? data : groupHistoricoByDay(data);

            let html = '<table class="text-xs text-left border-collapse">'
                + '<thead>'
                + '<tr class="text-gray-400">'
                + '<th rowspan="2" class="pb-1 pr-6 font-semibold align-bottom border-b border-gray-700">' + (isHourly ? 'Ordua' : 'Eguna') + '</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">CPU (%)</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">RAM (%)</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">Diskoa (%)</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">Tenp. (°C)</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">Bateria (%)</th>'
                + '<th colspan="3" class="pb-1 px-3 font-semibold text-center border-b border-gray-600">Estresa</th>'
                + '<th rowspan="2" class="pb-1 pl-4 font-semibold align-bottom border-b border-gray-700 text-right">Gailuak</th>'
                + '</tr>'
                + '<tr class="text-gray-500">'
                + ['CPU','RAM','Sto','Tmp','Bat','Str'].map(function() {
                    return '<th class="py-1 px-3 font-medium text-center">avg</th>'
                         + '<th class="py-1 px-3 font-medium text-center">min</th>'
                         + '<th class="py-1 px-3 font-medium text-center border-r border-gray-800">max</th>';
                  }).join('')
                + '</tr>'
                + '</thead>'
                + '<tbody class="divide-y divide-gray-800/50">';

            displayRows.forEach(function(r) {
                html += '<tr class="hover:bg-gray-800/20 transition-colors">'
                    + '<td class="py-2 pr-6 text-gray-300 font-mono whitespace-nowrap">' + fmtSlot(r.slot, isHourly) + '</td>'
                    + td(r.cpuAvg, 60, 80, '%') + tdN(r.cpuMin, '%') + tdNB(r.cpuMax, '%')
                    + td(r.ramAvg, 60, 80, '%') + tdN(r.ramMin, '%') + tdNB(r.ramMax, '%')
                    + td(r.stoAvg, 70, 90, '%') + tdN(r.stoMin, '%') + tdNB(r.stoMax, '%')
                    + td(r.tmpAvg, 65, 80, '°C') + tdN(r.tmpMin, '°C') + tdNB(r.tmpMax, '°C')
                    + td(r.batAvg, 0, 0, '%') + tdN(r.batMin, '%') + tdNB(r.batMax, '%')
                    + td(r.strAvg, 40, 70, '') + tdN(r.strMin, '') + tdNB(r.strMax, '')
                    + '<td class="py-2 pl-4 text-gray-400 text-right">' + r.count + '</td>'
                    + '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function fmtVal(v) {
            return (v != null && !isNaN(v)) ? v.toFixed(1) : '—';
        }

        function fmtSlot(slot, isHourly) {
            var y = slot.substring(0, 4), mo = slot.substring(4, 6), d = slot.substring(6, 8);
            if (isHourly) return y + '/' + mo + '/' + d + ' ' + slot.substring(8, 10) + ':00';
            return y + '/' + mo + '/' + d;
        }

        function mColor(v, warn, crit) {
            if (!warn && !crit) return 'text-gray-300';
            if (v == null || isNaN(v)) return 'text-gray-500';
            if (v >= crit) return 'text-red-400';
            if (v >= warn) return 'text-yellow-400';
            return 'text-green-400';
        }

        // td con color (avg), td neutro (min), td neutro con borde derecho (max)
        function td(v, warn, crit, unit) {
            return '<td class="py-2 px-3 text-center ' + mColor(v, warn, crit) + '">' + fmtVal(v) + unit + '</td>';
        }
        function tdN(v, unit) {
            return '<td class="py-2 px-3 text-center text-gray-500">' + fmtVal(v) + unit + '</td>';
        }
        function tdNB(v, unit) {
            return '<td class="py-2 px-3 text-center text-gray-500 border-r border-gray-800">' + fmtVal(v) + unit + '</td>';
        }

        function groupHistoricoByDay(data) {
            var map = {};
            data.forEach(function(r) {
                var day = r.slot.substring(0, 8);
                if (!map[day]) map[day] = { rows: [], count: 0 };
                map[day].rows.push(r);
                map[day].count += r.count;
            });
            return Object.keys(map).sort().map(function(day) {
                var g = map[day];
                var w = g.count || 1;
                function wa(f) { return g.rows.reduce(function(s,r){ return s+(r[f]||0)*r.count; },0)/w; }
                function mn(f) { return Math.min.apply(null, g.rows.map(function(r){ return r[f]||0; })); }
                function mx(f) { return Math.max.apply(null, g.rows.map(function(r){ return r[f]||0; })); }
                return { slot: day,
                    cpuAvg: wa('cpuAvg'), cpuMin: mn('cpuMin'), cpuMax: mx('cpuMax'),
                    ramAvg: wa('ramAvg'), ramMin: mn('ramMin'), ramMax: mx('ramMax'),
                    stoAvg: wa('stoAvg'), stoMin: mn('stoMin'), stoMax: mx('stoMax'),
                    tmpAvg: wa('tmpAvg'), tmpMin: mn('tmpMin'), tmpMax: mx('tmpMax'),
                    batAvg: wa('batAvg'), batMin: mn('batMin'), batMax: mx('batMax'),
                    strAvg: wa('strAvg'), strMin: mn('strMin'), strMax: mx('strMax'),
                    count: g.count };
            });
        }

        /*]]>*/
    </script>
