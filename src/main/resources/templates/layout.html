<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHardMon - Telemetry</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkPanel: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style> 
      .dropdown-menu { display: none; }
      .dropdown:hover .dropdown-menu { display: block; }
      .grafana-panel-frame { overflow: hidden; }
      .grafana-panel-frame iframe { display: block; overflow: hidden; }
    </style>
</head>
<body class="bg-darkBg text-gray-200 antialiased h-screen flex overflow-hidden selection:bg-blue-600 selection:text-white">

    <!-- Sidebar -->
    <aside class="w-64 bg-darkPanel border-r border-gray-800 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                WebHardMon
            </span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a th:href="@{/dashboard/empresa}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'empresa'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Empresa
            </a>

            <a th:href="@{/dashboard/ordenadores}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'ordenadores'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Ordenadores
            </a>
            <a th:href="@{/licencias}" class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors" th:classappend="${seccionActiva == 'licencias'} ? ' bg-blue-600/10 text-blue-400' : ' hover:bg-gray-800 text-gray-400 hover:text-white'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                Licencias
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-16 bg-darkPanel border-b border-gray-800 flex items-center justify-between px-6 z-10">
            <div class="text-sm font-medium text-gray-400">
                <!-- Fallback en caso de que no haya principal validado de Thymeleaf -->
                Compañía: <span class="text-white" th:text="${empresaNombre}">Empresa</span> · <span th:text="${dashboardTitulo}">Dashboard</span>
            </div>

            <!-- Selectores de Dispositivo y Rango de Tiempo (Filtros en el Cliente) -->
            <div class="flex items-center gap-4 bg-gray-900/40 rounded-xl px-4 py-2 border border-gray-800/60 shadow-inner">
                <!-- Selector de RAM -->
                <div class="flex items-center gap-2" th:if="${dashboardTipo == 'empresa'}">
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">RAM:</span>
                    <select id="selectRam" onchange="filterLaptopsAndUpdate()" class="bg-darkBg text-gray-200 border border-gray-800 rounded-lg px-3 py-1.5 text-xs font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all cursor-pointer">
                        <option value="All">Todas</option>
                        <option value="8">8 GB</option>
                        <option value="16">16 GB</option>
                        <option value="32">32 GB</option>
                        <option value="64">64 GB</option>
                    </select>
                </div>

                <!-- Divisor visual -->
                <div class="h-4 w-px bg-gray-800"></div>

                <!-- Selector de Almacenamiento -->
                <div class="flex items-center gap-2" th:if="${dashboardTipo == 'empresa'}">
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Disco:</span>
                    <select id="selectStorage" onchange="filterLaptopsAndUpdate()" class="bg-darkBg text-gray-200 border border-gray-800 rounded-lg px-3 py-1.5 text-xs font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all cursor-pointer">
                        <option value="All">Todos</option>
                        <option value="256">256 GB</option>
                        <option value="512">512 GB</option>
                        <option value="1024">1024 GB (1 TB)</option>
                        <option value="2048">2048 GB (2 TB)</option>
                    </select>
                </div>

                <!-- Divisor visual -->
                <div class="h-4 w-px bg-gray-800"></div>

                <!-- Selector de Portátil -->
                <div class="flex items-center gap-2" th:if="${dashboardTipo == 'ordenadores'}">
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Dispositivo:</span>
                    <select id="selectPortatil" onchange="updateDashboard()" class="bg-darkBg text-gray-200 border border-gray-800 rounded-lg px-3 py-1.5 text-xs font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all cursor-pointer">
                        <option value="All">Todos los portátiles</option>
                    </select>
                </div>

                <!-- Divisor visual -->
                <div class="h-4 w-px bg-gray-800"></div>

                <div class="h-4 w-px bg-gray-800" th:if="${dashboardTipo == 'empresa'}"></div>

                <div class="flex items-center gap-2" th:if="${dashboardTipo == 'empresa'}">
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Top:</span>
                    <select id="selectTopK" onchange="updateDashboard()" class="bg-darkBg text-gray-200 border border-gray-800 rounded-lg px-3 py-1.5 text-xs font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all cursor-pointer">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                    </select>
                </div>

                <!-- Selector de Rango de Tiempo -->
                <div class="flex items-center gap-2" th:if="${dashboardTipo == 'empresa' || dashboardTipo == 'ordenadores'}">
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Rango:</span>
                    <select id="selectTime" onchange="updateDashboard()" class="bg-darkBg text-gray-200 border border-gray-800 rounded-lg px-3 py-1.5 text-xs font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all cursor-pointer">
                        <option value="now-1h">Última hora</option>
                        <option value="now-24h">Últimas 24 horas</option>
                        <option value="now-7d">Últimos 7 días</option>
                        <option value="now-30d" selected>Último mes</option>
                    </select>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Notificaciones (Coming Soon) -->
                <div class="relative dropdown">
                    <button class="p-2 text-gray-400 hover:text-white transition-colors relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <!-- Dropdown Content -->
                    <div class="dropdown-menu absolute right-0 mt-2 w-48 bg-gray-800 border border-gray-700 rounded-lg shadow-xl py-2 z-50">
                        <div class="px-4 py-2 text-sm text-gray-300 border-b border-gray-700">Notificaciones</div>
                        <div class="px-4 py-6 text-center text-sm text-gray-500 italic">
                            Coming soon...
                        </div>
                    </div>
                </div>

                <!-- Perfil Autenticado -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold shadow-inner">
                        <span sec:authentication="name" class="uppercase">US</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Body -->
        <main class="flex-1 p-6 overflow-auto space-y-6">
            
            <!-- KPI Cards Grid (Row 1) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <!-- Card 1: CPU Actual -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=1'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <!-- Card 2: RAM Actual -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=2'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <!-- Card 3: Disco Actual -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=3'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <!-- Card 4: Temperatura Actual -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=4'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <!-- Card 5: Bateria Actual -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=5'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <!-- Card 6: Portátiles Activos -->
                <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-36 p-1 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=6'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
            </div>

            <!-- Empresa: rankings visuales en tabla con barra interna y nombre completo -->
            <div th:if="${dashboardTipo == 'empresa'}" class="space-y-6">
                <div class="top-panel bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-[520px] p-2 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=7'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <div class="top-panel bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-[520px] p-2 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=8'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <div class="top-panel bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-[520px] p-2 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=9'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <div class="top-panel bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-[520px] p-2 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=10'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
                <div class="top-panel bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-[520px] p-2 hover:border-gray-700 transition-all duration-300">
                    <iframe th:src="${grafanaIframeUrl} + '&panelId=11'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                </div>
            </div>

            <!-- Ordenadores: históricos del portátil seleccionado -->
            <div th:if="${dashboardTipo == 'ordenadores'}" class="space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=7'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=8'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=9'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=10'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=11'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                    <div class="bg-darkPanel rounded-xl border border-gray-850 shadow-lg overflow-hidden h-96 p-2 hover:border-gray-700 transition-all duration-300">
                        <iframe th:src="${grafanaIframeUrl} + '&panelId=12'" width="100%" height="100%" frameborder="0" scrolling="no" class="w-full h-full grafana-panel-frame"></iframe>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Script de control dinámico del Dashboard (d-solo) -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const empresaId = [[${empresaId}]];
        const dashboardTipo = [[${dashboardTipo}]];
        const portatilesVictoria = [[${portatiles}]];
        
        // Fallback local para desarrollo: coincide con seed-victoria.sh si VictoriaMetrics no responde.
        const RAM_TOTAL_OPCIONES = [8, 16, 32, 64];
        const STORAGE_TOTAL_OPCIONES = [256, 512, 1024, 2048];
        const PROCESADORES = ["Intel_i5_1135G7", "Intel_i7_1165G7", "AMD_Ryzen_5_5600U", "AMD_Ryzen_7_5800U", "Apple_M1"];
        
        const laptops = [];
        
        if (Array.isArray(portatilesVictoria) && portatilesVictoria.length > 0) {
            portatilesVictoria.forEach(name => laptops.push({
                name: name,
                ram: '',
                storage: '',
                processor: 'detectado'
            }));
        } else {
            for (let i = 1; i <= 100; i++) {
                const calculatedEmpresaId = (i % 3) + 1;
                if (calculatedEmpresaId === parseInt(empresaId)) {
                    const pcName = `PC-${empresaId}-${i}`;
                    const ram = RAM_TOTAL_OPCIONES[i % RAM_TOTAL_OPCIONES.length];
                    const storage = STORAGE_TOTAL_OPCIONES[i % STORAGE_TOTAL_OPCIONES.length];
                    const processor = PROCESADORES[i % PROCESADORES.length];
                    
                    laptops.push({
                        name: pcName,
                        ram: ram.toString(),
                        storage: storage.toString(),
                        processor: processor
                    });
                }
            }
        }

        // Generar dinámicamente la lista de portátiles en base a los filtros actuales
        function populateLaptops() {
            const selectPortatil = document.getElementById('selectPortatil');
            if (!selectPortatil) { return; }
            const selectedRam = (document.getElementById('selectRam')?.value || 'All');
            const selectedStorage = (document.getElementById('selectStorage')?.value || 'All');
            const previousValue = selectPortatil.value;
            
            // Vaciar excepto el primero (Todos)
            selectPortatil.innerHTML = '';
            
            laptops.forEach(laptop => {
                const matchesRam = selectedRam === 'All' || laptop.ram === selectedRam;
                const matchesStorage = selectedStorage === 'All' || laptop.storage === selectedStorage;
                
                if (matchesRam && matchesStorage) {
                    const option = document.createElement('option');
                    option.value = laptop.name;
                    if (laptop.ram && laptop.storage) {
                        option.textContent = `${laptop.name} (${laptop.processor}, ${laptop.ram}GB, ${laptop.storage >= 1024 ? (laptop.storage / 1024) + 'TB' : laptop.storage + 'GB'})`;
                    } else {
                        option.textContent = laptop.name;
                    }
                    selectPortatil.appendChild(option);
                }
            });
            
            // Intentar mantener el valor seleccionado previamente si aún existe en el listado filtrado
            if ([...selectPortatil.options].some(opt => opt.value === previousValue)) {
                selectPortatil.value = previousValue;
            } else {
                if (selectPortatil.options.length > 0) { selectPortatil.value = selectPortatil.options[0].value; }
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const selectTime = document.getElementById('selectTime');
            if (selectTime && dashboardTipo === 'ordenadores') {
                selectTime.value = 'now-24h';
            }
            if (selectTime && dashboardTipo === 'empresa') {
                selectTime.value = 'now-30d';
            }
            if (dashboardTipo === 'ordenadores') {
                populateLaptops();
            }
            updateDashboard();
        });

        // Llamado cuando cambian los filtros de RAM o Almacenamiento
        function filterLaptopsAndUpdate() {
            updateDashboard();
        }


        function updateTopPanelHeights() {
            if (dashboardTipo !== 'empresa') { return; }
            const topKValue = document.getElementById('selectTopK')?.value || '10';
            const heightByTop = { '5': '360px', '10': '520px', '15': '720px' };
            const height = heightByTop[topKValue] || '420px';
            document.querySelectorAll('.top-panel').forEach(panel => {
                panel.style.height = height;
            });
        }

        // Recarga todos los iframes con los nuevos filtros seleccionados
        function updateDashboard() {
            const timeValue = document.getElementById('selectTime')?.value || (dashboardTipo === 'empresa' ? 'now-30d' : 'now-24h');
            const portatilValue = document.getElementById('selectPortatil')?.value || (laptops[0]?.name || '');
            const ramValue = document.getElementById('selectRam')?.value || 'All';
            const storageValue = document.getElementById('selectStorage')?.value || 'All';
            const topKValue = document.getElementById('selectTopK')?.value || '10';
            updateTopPanelHeights();
            const iframes = document.querySelectorAll('main iframe');

            iframes.forEach(iframe => {
                let url = new URL(iframe.src);
                url.searchParams.set('from', timeValue);
                url.searchParams.set('to', 'now');

                if (dashboardTipo === 'ordenadores') {
                    url.searchParams.set('var-portatil', portatilValue === 'All' ? '.*' : portatilValue);
                }

                if (dashboardTipo === 'empresa') {
                    url.searchParams.set('var-ram', ramValue === 'All' ? '.*' : ramValue);
                    url.searchParams.set('var-storage', storageValue === 'All' ? '.*' : storageValue);
                    url.searchParams.set('var-topk', topKValue);
                }

                iframe.src = url.toString();
            });
        }
        /*]]>*/
    </script>
</body>
</html>
