events {}

http {
    upstream app_backend {
        server host.docker.internal:8080;
    }

    upstream grafana_backend {
        server host.docker.internal:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        location = /auth/grafana {
            internal;

            proxy_pass http://app_backend/internal/auth/grafana;
            proxy_pass_request_body off;

            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Internal-Token "change-this-secret";
        }

        location /grafana/ {
            auth_request /auth/grafana;

            auth_request_set $grafana_user $upstream_http_x_grafana_user;
            auth_request_set $grafana_company $upstream_http_x_grafana_company;

            proxy_pass http://grafana_backend/grafana/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header X-WEBAUTH-USER $grafana_user;
            proxy_set_header X-Company-ID $grafana_company;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}